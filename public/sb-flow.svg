<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      .plate-text {
        font-family: "Inter", "Montserrat", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 800;
        fill: #000000;
        text-anchor: middle;
        dominant-baseline: central;
      }
    </style>
  </defs>

  <!-- Background -->
  <!-- <rect width="1000" height="500" fill="#ffffff" /> -->

  <!-- 3 Horizontal Lines (Drawn behind the plates) -->
  <g>
    <!-- Top Line -->
    <line x1="270" y1="220" x2="820" y2="220" stroke="#000000" stroke-width="12" />
    <!-- Middle Line (Extends out of the last plate with a rounded end) -->
    <line x1="290" y1="246" x2="940" y2="246" stroke="#000000" stroke-width="12" stroke-linecap="round" />
    <!-- Bottom Line -->
    <line x1="310" y1="270" x2="850" y2="270" stroke="#000000" stroke-width="12" />
  </g>

  <!-- Left-hand Converging Curves (Tapered Swooshes) -->
  <g fill="#000000">
    <!-- Stripe 1 (Topmost) -->
    <path d="M 0,10 C 90,80 170,194 285,194 L 285,206 C 170,206 90,140 0,110 Z" />
    
    <!-- Stripe 2 -->
    <path d="M 0,140 C 95,165 180,214 295,214 L 295,226 C 180,226 95,200 0,190 Z" />
    
    <!-- Stripe 3 -->
    <path d="M 0,215 C 100,225 190,234 305,234 L 305,246 C 190,246 100,245 0,245 Z" />
    
    <!-- Stripe 4 -->
    <path d="M 0,255 C 100,255 190,254 315,254 L 315,266 C 190,266 100,275 0,285 Z" />
    
    <!-- Stripe 5 -->
    <path d="M 0,310 C 105,300 200,274 325,274 L 325,286 C 200,286 105,335 0,360 Z" />
    
    <!-- Stripe 6 (Bottommost) -->
    <path d="M 0,390 C 110,360 210,294 335,294 L 335,306 C 210,306 110,420 0,490 Z" />
  </g>

  <!-- 5 Tilted Plates (Solid White Polygons) -->
  <g fill="#000000">
    <!-- Plate 1: Discover -->
    <polygon points="210,100 320,125 450,390 340,365" />
    
    <!-- Plate 2: Define -->
    <polygon points="391.5,126.25 481.5,146.75 588.5,363.75 498.5,343.25" />
    
    <!-- Plate 3: Design & Build -->
    <polygon points="549.5,147.5 623.5,164.5 710.5,342.5 636.5,325.5" />
    
    <!-- Plate 4: Launch -->
    <polygon points="679,165 739,179 811,325 751,311" />
    
    <!-- Plate 5: Scale Impact -->
    <polygon points="786,179.5 836,190.5 894,310.5 844,299.5" />
  </g>

  <!-- Typography Overlay -->
  <g class="plate-text">
    <!-- Discover -->
    <text x="330" y="246" font-size="17" fill="#ffffff">Discover</text>
    
    <!-- Define -->
    <text x="490" y="246" font-size="15" fill="#ffffff">Define</text>
    
    <!-- Design & Build -->
    <text x="630" y="236" font-size="11.5" fill="#ffffff">Design &amp;</text>
    <text x="630" y="256" font-size="11.5" fill="#ffffff">Build</text>
    
    <!-- Launch -->
    <text x="745" y="246" font-size="11.5" fill="#ffffff">Launch</text>
    
    <!-- Scale Impact -->
    <text x="840" y="237" font-size="9" fill="#ffffff">Scale</text>
    <text x="840" y="253" font-size="9" fill="#ffffff">Impact</text>
  </g>
</svg>